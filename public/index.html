<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTDT Generator</title>
<style>
body{font-family:sans-serif;background:#fff3e8;padding:20px}
select,input,button{padding:10px;margin:5px 0;width:100%}
#result img{max-width:100%;margin-top:20px}
</style>
</head>
<body>

<h1>Been There Done Tat</h1>

<textarea id="prompt" placeholder="Describe your tattoo"></textarea>

<select id="style">
<option>Traditional</option>
<option>Fine Line</option>
<option>Japanese</option>
<option>Blackwork</option>
</select>

<select id="placement">
<option>Arm</option>
<option>Leg</option>
<option>Chest</option>
<option>Back</option>
</select>

<select id="size">
<option>Small</option>
<option>Medium</option>
<option>Large</option>
</select>

<select id="color">
<option>Black & Grey</option>
<option>Full Color</option>
<option>Red & Black</option>
</select>

<input type="file" id="inspoFile">

<div>Free left: <span id="count">3</span></div>

<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
const LIMIT = 3;

function getUsage(){
  const d = JSON.parse(localStorage.getItem("usage")||"{}");
  if(d.date !== new Date().toDateString()){
    return {date:new Date().toDateString(),count:0};
  }
  return d;
}

function saveUsage(d){
  localStorage.setItem("usage",JSON.stringify(d));
}

function updateUI(){
  const d = getUsage();
  document.getElementById("count").innerText = LIMIT - d.count;
}

async function generate(){
  const d = getUsage();
  if(d.count >= LIMIT){
    alert("Free limit reached");
    return;
  }

  const prompt = document.getElementById("prompt").value;
  if(!prompt){alert("Enter prompt");return;}

  const full = prompt + " " +
    document.getElementById("style").value + " " +
    document.getElementById("placement").value + " " +
    document.getElementById("size").value + " " +
    document.getElementById("color").value;

  const res = await fetch("/api/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:full})
  });

  const data = await res.json();

  const img = document.createElement("img");
  img.src = "data:image/png;base64," + data.image;
  document.getElementById("result").innerHTML="";
  document.getElementById("result").appendChild(img);

  d.count++;
  saveUsage(d);
  updateUI();
}

updateUI();
</script>

</body>
</html>
