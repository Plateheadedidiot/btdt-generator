
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BTDT Generator</title>
<style>
body{font-family:Arial;background:#f6e4cc;text-align:center;padding:40px;}
textarea{width:90%;max-width:500px;height:120px;padding:10px;}
button{margin-top:10px;padding:10px 20px;font-size:16px;cursor:pointer;}
img{margin-top:20px;max-width:500px;width:90%;}

#loader{display:none;margin-top:20px;}
#loader img{max-width:420px;}

.progress{
width:320px;
height:16px;
border:2px solid #000;
background:#fff;
margin:12px auto;
}

.bar{
height:100%;
width:0%;
background:#000;
transition:width .4s;
}
</style>
</head>
<body>

<h1>Been There Done Tat Generator</h1>

<textarea id="prompt" placeholder="Describe your tattoo idea"></textarea><br>
<button onclick="generate()">Generate</button>

<div id="loader">
<img id="cow" src="/loading/frame1.png">
<p>Drawing your stencil...</p>
<div class="progress"><div id="bar" class="bar"></div></div>
</div>

<div id="result"></div>

<script>

const frames=[
"/loading/frame1.png",
"/loading/frame2.png",
"/loading/frame3.png",
"/loading/frame4.png",
"/loading/frame5.png",
"/loading/frame6.png",
"/loading/frame7.png",
"/loading/frame8.png"
];

let frameIndex=0;
let anim;

function startLoader(){
document.getElementById("loader").style.display="block";
document.getElementById("bar").style.width="10%";

anim=setInterval(()=>{
frameIndex=(frameIndex+1)%frames.length;
document.getElementById("cow").src=frames[frameIndex];
},450);
}

function stopLoader(){
clearInterval(anim);
document.getElementById("loader").style.display="none";
}

async function generate(){

const prompt=document.getElementById("prompt").value;
const result=document.getElementById("result");
result.innerHTML="";

startLoader();

const res=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

document.getElementById("bar").style.width="65%";

const data=await res.json();

document.getElementById("bar").style.width="100%";

stopLoader();

if(data.data){
const img=document.createElement("img");
img.src="data:image/png;base64,"+data.data[0].b64_json;
result.appendChild(img);
}else{
result.innerHTML="Error generating image";
}

}

</script>

</body>
</html>
