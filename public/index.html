<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTDT Generator</title>
<style>
body{font-family:sans-serif;background:#f6e4cc;padding:20px}
select,textarea,button{width:100%;margin:8px 0;padding:10px}
#loader{display:none;text-align:center;font-weight:bold}
#result img{max-width:100%;margin-top:15px}
</style>
</head>
<body>

<h1>Been There Done Tat</h1>

<textarea id="prompt" placeholder="Describe your tattoo"></textarea>

<select id="style">
<option>Traditional</option>
<option>Neo Traditional</option>
<option>Japanese</option>
<option>Blackwork</option>
<option>Fine Line</option>
<option>Cartoony</option>
<option>Realism</option>
<option>Illustrative</option>
<option>Dotwork</option>
<option>Watercolor</option>
</select>

<select id="placement">
<option>Arm</option>
<option>Forearm</option>
<option>Upper Arm</option>
<option>Leg</option>
<option>Thigh</option>
<option>Calf</option>
<option>Chest</option>
<option>Back</option>
<option>Hand</option>
<option>Behind Ear</option>
</select>

<select id="size">
<option>Small</option>
<option>Medium</option>
<option>Large</option>
<option>Half Sleeve</option>
<option>Full Sleeve</option>
<option>Back Piece</option>
</select>

<select id="color">
<option>Black & Grey</option>
<option>Full Color</option>
<option>Red & Black</option>
<option>Pastel</option>
</select>

<div id="loader">🐄 Generating... (cow loading)</div>

<button onclick="generate()">Generate</button>

<div id="result"></div>

<script>
async function generate(){
  const prompt = document.getElementById("prompt").value;
  if(!prompt){alert("Enter prompt");return;}

  document.getElementById("loader").style.display="block";

  const full = prompt + " " +
    document.getElementById("style").value + " " +
    document.getElementById("placement").value + " " +
    document.getElementById("size").value + " " +
    document.getElementById("color").value;

  const res = await fetch("/api/generate",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({prompt:full})
  });

  const data = await res.json();

  document.getElementById("loader").style.display="none";

  const img = document.createElement("img");
  img.src = "data:image/png;base64," + data.image;
  document.getElementById("result").innerHTML="";
  document.getElementById("result").appendChild(img);
}
</script>

</body>
</html>
