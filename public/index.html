<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTDT Generator</title>
<style>
body{font-family:sans-serif;background:#f6e4cc;padding:20px}
.panel{max-width:800px;margin:auto;background:#fff;padding:20px;border-radius:20px}
textarea,button{width:100%;margin:10px 0;padding:12px}
#loader{display:none;text-align:center;margin-top:20px}
</style>
</head>
<body>

<div class="panel">
<h1>Been There Done Tat</h1>

<textarea id="prompt" placeholder="Describe tattoo"></textarea>
<button onclick="generate()">Generate</button>

<div id="loader">
  <img id="frame" src="/loading/frame1.png" style="max-width:100%">
  <p id="caption">Thinking of something stupid...</p>
</div>

<div id="result"></div>
</div>

<script>
const frames = [
  {img:"/loading/frame1.png", text:"Thinking of something stupid..."},
  {img:"/loading/frame2.png", text:"Making it worse..."},
  {img:"/loading/frame3.png", text:"Yeah this is kinda fire..."},
  {img:"/loading/frame4.png", text:"Tattoo artist would hate this 🔥"}
];

async function generate(){
  const prompt = document.getElementById("prompt").value;
  if(!prompt){alert("enter prompt");return;}

  const loader = document.getElementById("loader");
  const frameEl = document.getElementById("frame");
  const caption = document.getElementById("caption");
  const result = document.getElementById("result");

  loader.style.display="block";
  result.innerHTML="";

  let index = 0;
  frameEl.src = frames[0].img;
  caption.textContent = frames[0].text;

  let interval = setInterval(()=>{
    index++;
    if(index < frames.length){
      frameEl.src = frames[index].img;
      caption.textContent = frames[index].text;
    }
  },1200);

  try{
    const res = await fetch("/api/generate",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({prompt})
    });

    const data = await res.json();

    clearInterval(interval);
    loader.style.display="none";

    const img = document.createElement("img");
    img.src = "data:image/png;base64," + data.image;
    result.appendChild(img);

  }catch(e){
    clearInterval(interval);
    loader.style.display="none";
    alert("error");
  }
}
</script>

</body>
</html>
