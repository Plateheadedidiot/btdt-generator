<!DOCTYPE html><html><head><meta charset="UTF-8"><title>BTDT Generator</title></head>
<body style="background:#f6e4cc;font-family:Arial;text-align:center;padding:40px;">
<h1>Been There Done Tat Generator</h1>
<textarea id="prompt" style="width:90%;max-width:500px;height:120px;"></textarea><br>
<button onclick="generate()">Generate</button>
<div id="loader" style="display:none;margin-top:20px;">
<img id="cow" src="/loading/frame1.png" style="max-width:600px;"><p id="text">Sketching...</p>
</div>
<div id="result"></div>
<script>
const frames=["/loading/frame1.png","/loading/frame2.png","/loading/frame3.png","/loading/frame4.png","/loading/frame5.png","/loading/frame6.png","/loading/frame7.png","/loading/frame8.png"];
let i=0,anim;
function start(){document.getElementById("loader").style.display="block";
anim=setInterval(()=>{i=(i+1)%frames.length;document.getElementById("cow").src=frames[i];},500);}
function stop(){clearInterval(anim);document.getElementById("loader").style.display="none";}
async function generate(){
const p=document.getElementById("prompt").value;
start();
const r=await fetch("/api/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({prompt:p})});
const d=await r.json();
stop();
if(d.data){const img=document.createElement("img");img.src="data:image/png;base64,"+d.data[0].b64_json;document.getElementById("result").appendChild(img);}
}
</script></body></html>
