
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>BTDT Generator</title>
<style>
body{
margin:0;
font-family:Arial;
background:#f6e4cc;
text-align:center;
padding:40px;
}

textarea{
width:320px;
height:100px;
padding:10px;
}

button{
padding:12px 20px;
margin-top:10px;
}

#loader{
display:none;
margin-top:30px;
}

#cowFrame{
max-width:500px;
width:100%;
border:3px solid #111;
border-radius:20px;
background:white;
}

.progress{
width:320px;
height:18px;
border:3px solid #111;
margin:20px auto;
border-radius:999px;
overflow:hidden;
background:#fff;
}

.bar{
height:100%;
width:6%;
background:linear-gradient(90deg,#ff8ab4,#ffd36b);
transition:width .35s ease;
}
</style>
</head>

<body>

<h2>BTDT Tattoo Generator</h2>

<textarea id="prompt" placeholder="Describe your tattoo idea..."></textarea>
<br>
<button onclick="generate()">Generate</button>

<div id="loader">
<img id="cowFrame" src="/loading/frame1.png">

<h3 id="loadingText">Sketching idea...</h3>

<div class="progress">
<div id="bar" class="bar"></div>
</div>
</div>

<div id="result"></div>

<script>

const frames=[
"/loading/frame1.png",
"/loading/frame2.png",
"/loading/frame3.png",
"/loading/frame4.png"
];

let progress=6;
let timers=[];
let interval;

function showFrame(i){
document.getElementById("cowFrame").src=frames[i];
}

function startLoader(){

document.getElementById("loader").style.display="block";
document.getElementById("bar").style.width="6%";
progress=6;

showFrame(0);

timers.push(setTimeout(()=>showFrame(1),1200));
timers.push(setTimeout(()=>showFrame(2),2400));
timers.push(setTimeout(()=>showFrame(3),3600));

interval=setInterval(()=>{

if(progress<72)progress+=5;
else if(progress<88)progress+=2;
else if(progress<94)progress+=1;

document.getElementById("bar").style.width=progress+"%";

},500);
}

function stopLoader(){

timers.forEach(t=>clearTimeout(t));
clearInterval(interval);

document.getElementById("bar").style.width="100%";

setTimeout(()=>{
document.getElementById("loader").style.display="none";
},300);
}

async function generate(){

const prompt=document.getElementById("prompt").value;

if(!prompt){
alert("Enter a prompt");
return;
}

startLoader();

try{

const res=await fetch("/api/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({prompt})
});

const data=await res.json();

stopLoader();

if(data?.data?.[0]?.b64_json){

const img=document.createElement("img");
img.src="data:image/png;base64,"+data.data[0].b64_json;
img.style.maxWidth="500px";

document.getElementById("result").innerHTML="";
document.getElementById("result").appendChild(img);

}else{

document.getElementById("result").innerText="Error generating image";

}

}catch(e){

stopLoader();
document.getElementById("result").innerText="Request failed";

}

}

</script>

</body>
</html>
